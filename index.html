<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PAPANATAS LEVELS LIST</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <aside class="sidebar" role="navigation" aria-label="Main navigation">
    <nav class="nav">
      <a class="nav-link active" href="index.html">Main list</a>
      <a class="nav-link" href="packs.html">Packs</a>
      <a class="nav-link" href="users.html">User stats</a>
    </nav>
  </aside>

  <button id="sidebarToggle" title="Ocultar/mostrar menú">☰</button>

  <div class="main-wrap">
    <header class="site-header" role="banner">
      <div class="header-inner">
        <div class="header-left">
          <a href="index.html" class="site-title">PAPANATAS LEVELS LIST</a>
        </div>

        <div class="header-right">
          <input id="search" type="text" placeholder="Search levels or creators..." aria-label="Buscar niveles o creadores" />
          <button id="filterBtn" class="filter-btn">Filtros ▾</button>
        </div>
      </div>
    </header>

    <div id="filterPanel" class="filter-panel hidden" aria-hidden="true">
      <div class="filter-column filter-column--tags" aria-label="Filtrar por tags">
        <div class="filter-title">Tags</div>
        <div id="tagsContainer" class="checkbox-list"></div>
      </div>

      <div class="vertical-divider" aria-hidden="true"></div>

      <div class="filter-column filter-column--tiers" aria-label="Filtrar por tiers">
        <div class="filter-title">Tiers</div>
        <div id="tiersContainer" class="checkbox-list"></div>
      </div>

      <div class="filter-actions" role="region" aria-label="Acciones de filtro">
        <button id="clearFilters" class="muted-btn">Limpiar</button>
        <button id="applyFilters" class="apply-btn">Aplicar</button>
      </div>
    </div>

    <main id="levels-container" class="levels-container" role="main" aria-live="polite"></main>

  </div>

  <script src="script.js"></script>
  <script src="ui.js"></script>
</body>
</html>
